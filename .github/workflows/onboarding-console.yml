# Build the DatArk Console (ops UI) image and push it to the NHN Container Registry.
#
# Trigger: push a tag  vX.X.X-console  (e.g. v0.0.1-console).
#   git tag v0.0.1-console && git push origin v0.0.1-console
#
# Pushes:
#   36163004-kr1-registry.container.nhncloud.com/koneksi-tech/onboarding-console:<tag>
#   36163004-kr1-registry.container.nhncloud.com/koneksi-tech/onboarding-console:latest
#
# Required repo secrets:  NCR_USERNAME, NCR_PASSWORD
name: onboarding-console

on:
  push:
    tags:
      - 'v*.*.*-console'

permissions:
  contents: read

env:
  REGISTRY: 36163004-kr1-registry.container.nhncloud.com
  IMAGE: koneksi-tech/onboarding-console

jobs:
  build-and-push:
    name: Build & push console image
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to NHN NCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.NCR_USERNAME }}
          password: ${{ secrets.NCR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./console
          file: ./console/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "### Pushed onboarding-console image :rocket:"
            echo ""
            echo "- \`${REGISTRY}/${IMAGE}:${{ github.ref_name }}\`"
            echo "- \`${REGISTRY}/${IMAGE}:latest\`"
          } >> "$GITHUB_STEP_SUMMARY"
