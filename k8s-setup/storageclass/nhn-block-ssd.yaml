# Replicated from prod koneksi-cluster (nhn-block-ssd).
# NHN Block Storage via OpenStack Cinder CSI. Marked default on datark so
# kripfs/mongo/postgres PVCs bind without an explicit storageClassName.
# (Prod's copy is NOT default; datark needs a default on a fresh cluster.)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nhn-block-ssd
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: cinder.csi.openstack.org
parameters:
  type: General SSD
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
