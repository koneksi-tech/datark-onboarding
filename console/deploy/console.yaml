# DatArk Console — deployment into the datark-cluster.
# Namespace: console-ui · exposed via ingress-nginx (shared LoadBalancer).
# Prereqs created at deploy time (not committed): the `ncr-regcred` pull secret
# and the `console-tls` wildcard TLS secret in the console-ui namespace.
apiVersion: v1
kind: Namespace
metadata:
  name: console-ui
  labels:
    app.kubernetes.io/part-of: datark-console
---
# Read-scoped ServiceAccount the API uses to read tenant namespaces.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: datark-console
  namespace: console-ui
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: datark-console-read
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "services", "nodes"]
    verbs: ["get", "list", "watch"]
  # read the per-tenant secret to surface the kripfs bearer in tenant detail
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  # destroy tenant = delete its namespace (console Destroy button)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: datark-console-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: datark-console-read
subjects:
  - kind: ServiceAccount
    name: datark-console
    namespace: console-ui
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: datark-console
  namespace: console-ui
  labels: { app: datark-console }
spec:
  replicas: 1
  selector:
    matchLabels: { app: datark-console }
  template:
    metadata:
      labels: { app: datark-console }
    spec:
      serviceAccountName: datark-console
      imagePullSecrets:
        - name: ncr-regcred
      containers:
        - name: console
          image: 36163004-kr1-registry.container.nhncloud.com/koneksi-tech/onboarding-console:v0.0.10-console
          ports:
            - { name: http, containerPort: 3000 }
          env:
            - { name: PORT, value: "3000" }
            - { name: GITHUB_REPO, value: "koneksi-tech/datark-onboarding" }
            # GitHub token to dispatch the provisioning workflow (created imperatively)
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef: { name: console-github, key: token }
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "96Mi" }
            limits:   { cpu: "250m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: datark-console
  namespace: console-ui
spec:
  selector: { app: datark-console }
  ports:
    - { name: http, port: 80, targetPort: 3000 }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: datark-console
  namespace: console-ui
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["console.koneksi.co.kr"]
      secretName: console-tls
  rules:
    - host: console.koneksi.co.kr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: datark-console
                port:
                  number: 80
