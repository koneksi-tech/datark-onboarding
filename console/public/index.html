<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DatArk Console</title>
<style>
  :root{--bg:#f6f8fa;--card:#fff;--ink:#1f2328;--muted:#57606a;--line:#d0d7de;--accent:#1f6feb;--ok:#1a7f37;--warn:#9a6700;--danger:#cf222e;--chip:#eaeef2;}
  @media (prefers-color-scheme:dark){:root{--bg:#0d1117;--card:#161b22;--ink:#e6edf3;--muted:#8b949e;--line:#30363d;--accent:#58a6ff;--ok:#3fb950;--warn:#d29922;--danger:#f85149;--chip:#21262d;}}
  *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:14.5px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  /* login */
  .login{min-height:100vh;display:flex;align-items:center;justify-content:center}
  .lcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:26px 28px;width:330px;box-shadow:0 10px 40px rgba(0,0,0,.15)}
  .lcard .b{font-weight:800;font-size:20px;color:var(--accent);margin-bottom:4px}
  .lcard .m{color:var(--muted);font-size:13px;margin-bottom:16px}
  .lcard label{font-size:12px;font-weight:600;display:block;margin:10px 0 4px}
  .lcard input{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--ink);font-size:14px}
  .lcard button{width:100%;margin-top:16px;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px;font-weight:700;font-size:14px;cursor:pointer}
  .err{color:var(--danger);font-size:12px;margin-top:8px;min-height:16px}
  /* app */
  .app{display:flex;min-height:100vh}
  .side{width:190px;background:var(--card);border-right:1px solid var(--line);padding:16px 12px;display:flex;flex-direction:column}
  .brand{font-weight:800;font-size:17px;color:var(--accent);margin-bottom:16px}
  .side a{display:block;padding:8px 10px;border-radius:8px;color:var(--ink);text-decoration:none;margin-bottom:3px;cursor:pointer}
  .side a.on{background:rgba(31,111,235,.12);color:var(--accent);font-weight:600}
  .side .sp{flex:1}
  .side .out{font-size:12px;color:var(--muted);cursor:pointer;padding:8px 10px}
  .main{flex:1;padding:20px 24px;min-width:0}
  .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
  .h{font-size:18px;font-weight:700}
  .btn{background:var(--ok);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-weight:700;font-size:13px;cursor:pointer}
  .back{background:none;border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;margin-bottom:12px}
  table{width:100%;border-collapse:collapse;font-size:13px;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  th{background:var(--chip);text-align:left;padding:9px 11px;font-size:11px;color:var(--muted)}
  td{padding:10px 11px;border-top:1px solid var(--line)}
  tr.click{cursor:pointer} tr.click:hover td{background:rgba(31,111,235,.06)}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px}
  .green{background:var(--ok)}.amber{background:var(--warn)}.red{background:var(--danger)}.gray{background:var(--muted)}
  .tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--chip);color:var(--muted)}
  a.lnk{color:var(--accent);text-decoration:none} .muted{color:var(--muted)}
  .del{color:var(--danger);cursor:pointer;font-weight:600;font-size:12px}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:50}
  .sheet{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 20px;width:440px;max-width:92%;box-shadow:0 12px 44px rgba(0,0,0,.3)}
  .sheet label{font-size:12px;font-weight:600;display:block;margin:10px 0 4px}
  .sheet input{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--ink);font-size:14px}
  .tiers{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .tc{border:1px solid var(--line);border-radius:9px;padding:9px 11px;cursor:pointer}
  .tc.sel{border-color:var(--accent);background:rgba(31,111,235,.08)}
  .tc b{font-size:13px;text-transform:capitalize}.tc .sp{color:var(--muted);font-size:11px}
  .ecard{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:12px}
</style>
</head>
<body>
<div id="root"></div>
<script>
const $ = h => { const d=document.createElement('div'); d.innerHTML=h.trim(); return d.firstChild; };
const root = document.getElementById('root');
let view = 'dashboard', currentTenant = null, timer = null, modalOpen = false;

function dot(s){return s==='healthy'||s==='Ready'?'green':s==='degraded'?'amber':s==='unknown'?'gray':'red';}
async function api(p,opt){ const r=await fetch(p,opt); if(r.status===401) throw {auth:true}; return r.json(); }

// ---------- LOGIN ----------
function renderLogin(msg){
  root.innerHTML='';
  const el=$(`<div class="login"><div class="lcard">
    <div class="b">◆ DatArk Console</div><div class="m">Sign in to continue</div>
    <label>Username</label><input id="u" autofocus>
    <label>Password</label><input id="p" type="password">
    <button id="go">Sign in</button><div class="err" id="e">${msg||''}</div>
  </div></div>`);
  root.appendChild(el);
  const submit=async()=>{
    const username=el.querySelector('#u').value, password=el.querySelector('#p').value;
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    if(r.ok){ start(); } else { el.querySelector('#e').textContent='Invalid username or password'; }
  };
  el.querySelector('#go').onclick=submit;
  el.querySelector('#p').onkeydown=e=>{if(e.key==='Enter')submit();};
}

// ---------- SHELL ----------
function shell(inner){
  const nav=(id,label)=>`<a class="${view===id?'on':''}" onclick="go('${id}')">${label}</a>`;
  root.innerHTML='';
  root.appendChild($(`<div class="app">
    <div class="side">
      <div class="brand">◆ DatArk</div>
      ${nav('dashboard','▦ Dashboard')}${nav('tenants','◷ Tenants')}${nav('cluster','▤ Cluster')}
      <div class="sp"></div>
      <div class="out" onclick="logout()">⎋ Sign out</div>
    </div>
    <div class="main" id="main">${inner}</div>
  </div>`));
}
window.go = id => { view=id; currentTenant=null; render(); };
window.logout = async () => { await fetch('/api/logout',{method:'POST'}); if(timer)clearInterval(timer); renderLogin('Signed out.'); };
window.openTenant = name => { currentTenant=name; view='tenant'; render(); };
window.destroyTenant = async name => {
  if(!confirm(`Destroy tenant "${name}"?\n\nThis permanently deletes namespace tenant-${name} and ALL its data (pods, volumes, secrets). This cannot be undone.`)) return;
  const r = await fetch('/api/tenants/'+name, {method:'DELETE'});
  if(!r.ok){ const e=await r.json().catch(()=>({})); alert('Destroy failed: '+(e.error||r.status)); return; }
  render();
};
window.openOnboard = () => {
  const tiers=[['free','1 kipfs · 2Gi'],['starter','1 kipfs · 10Gi'],['pro','3 kipfs · 50Gi'],['enterprise','5 kipfs · 200Gi']];
  let tier='starter';
  const m=$(`<div class="overlay"><div class="sheet">
    <div class="h">Onboard a new tenant</div>
    <div class="muted" style="font-size:12px;margin-bottom:6px">Creates an isolated DatArk stack via the provisioning pipeline (~2 min).</div>
    <label>Client name</label><input id="oc" placeholder="e.g. globex" autocomplete="off">
    <div class="muted" id="oh" style="font-size:11px;margin:3px 0;min-height:14px"></div>
    <label>Plan</label>
    <div class="tiers" id="ot">${tiers.map((t,i)=>`<div class="tc ${i===1?'sel':''}" data-t="${t[0]}"><b>${t[0]}</b><div class="sp">${t[1]}</div></div>`).join('')}</div>
    <div class="err" id="oe"></div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn" id="ogo" style="flex:1;background:var(--accent)">Provision tenant →</button>
      <button class="back" id="ox">Cancel</button>
    </div></div></div>`);
  modalOpen=true; document.body.appendChild(m);
  const close=()=>{ modalOpen=false; m.remove(); };
  const oc=m.querySelector('#oc');
  m.querySelectorAll('.tc').forEach(el=>el.onclick=()=>{m.querySelectorAll('.tc').forEach(x=>x.classList.remove('sel'));el.classList.add('sel');tier=el.dataset.t;});
  oc.oninput=()=>{ m.querySelector('#oh').textContent = oc.value?`→ namespace tenant-${oc.value} · https://${oc.value}.koneksi.co.kr`:''; };
  m.querySelector('#ox').onclick=close;
  m.querySelector('#ogo').onclick=async()=>{
    m.querySelector('#oe').textContent='';
    const client=oc.value.trim();
    const btn=m.querySelector('#ogo'); btn.disabled=true; btn.textContent='Provisioning…';
    const r=await fetch('/api/tenants',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({client,tier})});
    const d=await r.json().catch(()=>({}));
    if(r.ok){ close(); alert(d.message||'Provisioning started.'); setTimeout(render,4000); }
    else { m.querySelector('#oe').textContent=d.error||('failed ('+r.status+')'); btn.disabled=false; btn.textContent='Provision tenant →'; }
  };
  oc.focus();
};

// ---------- VIEWS ----------
async function render(){
  try{
    if(view==='cluster') return renderCluster();
    if(view==='tenant') return renderTenant();
    return renderDashboard();
  }catch(e){ if(e.auth) renderLogin('Please sign in.'); }
}
async function renderDashboard(){
  const d=await api('/api/tenants');
  const rows=(d.tenants||[]).map(t=>`<tr class="click" onclick="openTenant('${t.name}')">
    <td><b>${t.name}</b></td><td><span class="tag">${t.tier}</span></td>
    <td><span class="dot ${dot(t.status)}"></span>${t.status}</td><td>${t.pods}</td>
    <td>${t.endpoint?`<a class="lnk" href="${t.endpoint}" target="_blank" onclick="event.stopPropagation()">${t.endpoint.replace('https://','')} ↗</a>`:'<span class="muted">—</span>'}</td>
    <td><span class="del" onclick="event.stopPropagation();destroyTenant('${t.name}')">🗑 Destroy</span></td>
  </tr>`).join('');
  shell(`<div class="top"><div class="h">Tenants</div><button class="btn" onclick="openOnboard()">＋ Onboard Tenant</button></div>
    <table><thead><tr><th>TENANT</th><th>TIER</th><th>STATUS</th><th>PODS</th><th>ENDPOINT</th><th></th></tr></thead>
    <tbody>${rows||'<tr><td colspan=6 class=muted>No tenants.</td></tr>'}</tbody></table>
    <p class="muted" style="font-size:12px;margin-top:8px">Click a tenant to see its components.</p>`);
}
async function renderTenant(){
  const d=await api('/api/tenants/'+currentTenant);
  const rows=(d.workloads||[]).map(w=>`<tr><td><b>${w.name}</b></td><td>${w.kind}</td>
    <td><span class="dot ${w.ok?'green':'amber'}"></span>${w.ready}</td></tr>`).join('');
  shell(`<button class="back" onclick="go('dashboard')">← Tenants</button>
    <div class="top"><div class="h">${d.name} <span class="muted" style="font-size:13px">· ${d.namespace}</span></div></div>
    <div class="ecard"><b>Endpoint</b> ${d.endpoint?`<span class="dot green"></span><a class="lnk" href="${d.endpoint}" target="_blank">${d.endpoint}</a>`:'<span class="muted">—</span>'}</div>
    <table><thead><tr><th>WORKLOAD</th><th>KIND</th><th>READY</th></tr></thead>
    <tbody>${rows||'<tr><td colspan=3 class=muted>No workloads.</td></tr>'}</tbody></table>`);
}
async function renderCluster(){
  const d=await api('/api/nodes');
  const rows=(d.nodes||[]).map(n=>`<tr><td><b>${n.name}</b></td>
    <td><span class="dot ${dot(n.status)}"></span>${n.status}</td><td>${n.cpu}</td>
    <td>${n.memory}</td><td>${n.version}</td><td class="muted">${n.os}</td></tr>`).join('');
  shell(`<div class="top"><div class="h">Cluster nodes</div></div>
    <table><thead><tr><th>NODE</th><th>STATUS</th><th>CPU</th><th>MEMORY</th><th>K8S</th><th>OS</th></tr></thead>
    <tbody>${rows||'<tr><td colspan=6 class=muted>No nodes.</td></tr>'}</tbody></table>`);
}

// ---------- BOOT ----------
async function start(){
  view='dashboard'; render();
  if(timer)clearInterval(timer);
  timer=setInterval(()=>{ if(view!=='tenant' && !modalOpen) render(); }, 10000);
}
(async()=>{ try{ await api('/api/me'); start(); }catch(e){ renderLogin(); } })();
</script>
</body>
</html>
