# =============================================================================
# datark-tenant — default values
# Per-tenant overrides come from tiers/<tier>.yaml + --set tenant.id=<id>.
# Secrets are NOT here — they are materialized into a K8s Secret from Vault by
# bin/lib/secret-sync.sh BEFORE `helm upgrade`. This chart only references it.
# =============================================================================

tenant:
  id: ""                         # REQUIRED. e.g. "abc" -> subdomain abc.<domain>
tier: "custom"                   # set by the tier values file (starter|pro|enterprise)

# Public DNS. Tenant URL = <tenant.id>.<domain>. Wildcard *.<domain> must point
# at the shared ingress-nginx, with a wildcard TLS secret available.
domain: "koneksi.co.kr"        # tenant URL = <id>.koneksi.co.kr (covered by *.koneksi.co.kr cert)
ingress:
  className: "nginx"
  tlsSecretName: "datark-wildcard-tls"   # wildcard cert secret (shared, pre-created)

# Name of the Secret materialized from Vault (created by secret-sync.sh).
# Every workload reads its credentials from here.
secretName: ""                   # defaults to "<tenant.id>-secret" via _helpers

# NCR image pull secret (created in the tenant namespace by the script).
imagePullSecret: "ncr-regcred"

images:
  # kripfs image — built by the kripfs repo's kipfs-image-nhn workflow on vX.X.X tags.
  kripfs:   "36163004-kr1-registry.container.nhncloud.com/koneksi-tech/kipfs:v0.0.1"
  # backend: reuse the existing NHN Container Registry image (koneksi-tech project).
  # NOTE: this registry is in the PROD koneksi NHN account (36163004). The new-account
  # cluster can only pull it if the repo is public/cross-account, else mirror it into
  # this environment's own registry. Pull secret name below = imagePullSecret.
  backend:  "36163004-kr1-registry.container.nhncloud.com/koneksi-tech/koneksi-backend:v0.1.0-staging"
  redis:    "redis:7-alpine"
  mongo:    "mongo:7"
  # TimescaleDB-enabled Postgres — the backend does CREATE EXTENSION timescaledb.
  postgres: "timescale/timescaledb:2.17.2-pg16"
  # kripfs-db — DB backup daemon (backs a tenant DB up to the tenant's kipfs).
  kripfsDb: "36163004-kr1-registry.container.nhncloud.com/koneksi-tech/kripfs-db:v0.0.3"

# ---- kripfs (StatefulSet) ----------------------------------------------------
kripfs:
  enabled: true                  # set false to skip kripfs (e.g. image not built yet)
  replicas: 1                    # tier-driven
  replicationFactor: 1           # tier-driven; MUST be <= replicas
  gatewayPort: 8080
  swarmPort: 4001
  apiPort: 5001
  # STANDARD: expose this tenant's kripfs cluster publicly at <id>-cluster.<domain>
  # (kripfs-ingress.yaml). Required for the DatArk Agent/desktop direct upload path.
  # When true, the backend's IPFS_NODE_URL and kripfs announce_addr both point at
  # https://<id>-cluster.<domain>. Needs a DNS A record for that host.
  publicEndpoint: true
  # Override the routable URL advertised in /cluster/peers. Normally leave "" —
  # it auto-derives to https://<id>-cluster.<domain> when publicEndpoint is true.
  # Empty + publicEndpoint false => null (internal-only, unreachable from outside).
  announceAddr: ""
  storage: "10Gi"                # per-pod PVC (blocks + identity + state)
  repoRoot: "/data"
  logLevel: "info"
  resources:
    requests: { cpu: "250m", memory: "512Mi" }
    limits:   { cpu: "500m", memory: "1Gi" }

# ---- backend (Deployment) ----------------------------------------------------
backend:
  replicas: 1
  port: 3000
  nodeEnv: "production"
  mode: "release"
  mongoDatabase: "koneksi"
  postgresDb: "koneksi"
  postgresUser: "postgres"
  resources:
    requests: { cpu: "250m", memory: "512Mi" }
    limits:   { cpu: "1",    memory: "1Gi" }
  # Non-secret app config passed straight into the backend ConfigMap.
  extraConfig: {}

# ---- redis (Deployment) ------------------------------------------------------
redis:
  port: 6379
  prefix: "KONEKSI"
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "250m", memory: "256Mi" }

# ---- mongodb (StatefulSet) ---------------------------------------------------
mongo:
  port: 27017
  rootUser: "root"
  # FIXED across all tiers — never overridden by tier files, never resized on
  # upgrade (keeps helm off the immutable-volume path). Only kripfs storage grows.
  storage: "20Gi"
  resources:
    requests: { cpu: "250m", memory: "512Mi" }
    limits:   { cpu: "500m", memory: "1Gi" }

# ---- postgres (StatefulSet) --------------------------------------------------
postgres:
  port: 5432
  # FIXED across all tiers (same rationale as mongo.storage above).
  storage: "20Gi"
  resources:
    requests: { cpu: "250m", memory: "256Mi" }
    limits:   { cpu: "500m", memory: "512Mi" }

# ---- kripfs-db (Deployment, 1 pod all tiers, internal — no public endpoint) --
kripfsDb:
  enabled: true                  # required component per tier
  backupDbType: "postgresql"     # which DB it backs up (postgresql|mysql|mongodb)
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "250m", memory: "256Mi" }

# ---- Vault (this environment's dedicated cluster; NOT prod koneksi vault) -----
vault:
  addr: ""                       # ${VAULT_ADDR} — fed at provision time
  transitMount: "transit"
  transitKey: ""                 # defaults to "datark-<tenant.id>"
  tlsSkipVerify: "false"
  dekCacheTtlSeconds: "300"

# ---- storage / isolation -----------------------------------------------------
storageClassName: ""             # "" = cluster default StorageClass
quota:
  cpu: "4"
  memory: "8Gi"
  storage: "100Gi"
networkPolicy:
  enabled: true
