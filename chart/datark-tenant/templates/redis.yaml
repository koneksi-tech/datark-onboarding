apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "datark.redis.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "datark.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "datark.redis.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "datark.redis.name" . }}
        {{- include "datark.labels" . | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.images.redis | quote }}
          command: ["sh", "-c", "exec redis-server --requirepass \"$REDIS_PASSWORD\""]
          env:
            - name: REDIS_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ include "datark.secretName" . }}, key: REDIS_PASSWORD } }
          ports:
            - { name: redis, containerPort: {{ .Values.redis.port }} }
          readinessProbe:
            exec: { command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG"] }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "datark.redis.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "datark.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ include "datark.redis.name" . }}
  ports:
    - name: redis
      port: {{ .Values.redis.port }}
      targetPort: {{ .Values.redis.port }}
