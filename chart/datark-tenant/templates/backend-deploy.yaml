apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "datark.backend.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "datark.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  # maxSurge 0: replace in place (no transient 2x pod) so rollouts fit the ResourceQuota.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: {{ include "datark.backend.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "datark.backend.name" . }}
        {{- include "datark.labels" . | nindent 8 }}
    spec:
      {{- if .Values.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret }}
      {{- end }}
      # The backend caches its Redis/Mongo/Postgres connections at startup and does
      # NOT retry — if it boots before those datastores accept connections (a race on
      # a fresh provision, since all pods start together) it permanently disables Redis,
      # which breaks session validation ("logged in from another device"). Block startup
      # until all three datastores are reachable. `nc -z` against the Service only
      # succeeds once the backing pod is an active endpoint (Ready), so this also gates
      # on their readiness.
      initContainers:
        - name: wait-for-datastores
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "waiting for mongo/redis/postgres…"
              until nc -z {{ include "datark.mongo.name" . }} {{ .Values.mongo.port }} \
                 && nc -z {{ include "datark.redis.name" . }} {{ .Values.redis.port }} \
                 && nc -z {{ include "datark.postgres.name" . }} {{ .Values.postgres.port }}; do
                sleep 2
              done
              echo "all datastores reachable"
          resources:
            requests: { cpu: "10m", memory: "16Mi" }
            limits:   { cpu: "50m", memory: "32Mi" }
      containers:
        - name: backend
          image: {{ .Values.images.backend | quote }}
          ports:
            - { name: http, containerPort: {{ .Values.backend.port }} }
          envFrom:
            - configMapRef:
                name: {{ include "datark.backend.name" . }}-config
            - secretRef:
                name: {{ include "datark.secretName" . }}
          # Readiness only (gates Service traffic). No liveness probe — matches prod,
          # avoids restart loops while the app boots / connects to deps.
          readinessProbe:
            httpGet: { path: /check-health, port: http }
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
