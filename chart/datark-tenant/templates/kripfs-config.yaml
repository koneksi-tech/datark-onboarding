{{- if .Values.kripfs.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "datark.kripfs.name" . }}-gen
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "datark.labels" . | nindent 4 }}
data:
  # Runs in an initContainer. Builds /config/config.json for THIS pod:
  # cluster_peers = every other ordinal's gateway URL (self excluded);
  # secrets injected from env (sourced from the Vault-materialized Secret).
  gen-config.sh: |
    #!/bin/sh
    set -eu
    ORD="${HOSTNAME##*-}"
    PEERS=""
    i=0
    while [ "$i" -lt "$REPLICAS" ]; do
      if [ "$i" != "$ORD" ]; then
        [ -n "$PEERS" ] && PEERS="${PEERS},"
        PEERS="${PEERS}\"http://${STS_NAME}-${i}.${HL_SVC}.${NAMESPACE}.svc.cluster.local:${GATEWAY_PORT}\""
      fi
      i=$((i + 1))
    done
    # announce_addr: routable URL advertised in /cluster/peers (what the desktop
    # dials). Empty ANNOUNCE_ADDR => null (fall back to 0.0.0.0, internal-only).
    if [ -n "${ANNOUNCE_ADDR:-}" ]; then
      ANNOUNCE_JSON="[\"${ANNOUNCE_ADDR}\"]"
    else
      ANNOUNCE_JSON="null"
    fi
    # koneksi_backend_url: backend for /auth/validate fallback (per-tenant JWTs).
    # Empty => null (kipfs then relies solely on the Environment-header mapping).
    if [ -n "${KONEKSI_BACKEND_URL:-}" ]; then
      BACKEND_URL_JSON="\"${KONEKSI_BACKEND_URL}\""
    else
      BACKEND_URL_JSON="null"
    fi
    mkdir -p "${REPO_ROOT}/state" "${REPO_ROOT}/keys" "${REPO_ROOT}/audit" "${REPO_ROOT}/blocks"
    # init runs as root; hand the data dir to the non-root kipfs user the daemon runs as
    chown -R kipfs:kipfs "${REPO_ROOT}" 2>/dev/null || true
    cat > /config/config.json <<EOF
    {
      "gateway_port": ${GATEWAY_PORT},
      "swarm_port": ${SWARM_PORT},
      "api_port": ${API_PORT},
      "listen_addr": null,
      "announce_addr": ${ANNOUNCE_JSON},
      "repo_root": "${REPO_ROOT}",
      "cluster_mode": "cluster",
      "cluster_peers": [ ${PEERS} ],
      "cluster_secret": "${KIPFS_CLUSTER_SECRET}",
      "replication_factor": ${REPLICATION_FACTOR},
      "cluster_state_path": "${REPO_ROOT}/state/cluster.json",
      "cluster_audit_path": "${REPO_ROOT}/audit/cluster-audit.log",
      "identity_key_path": "${REPO_ROOT}/keys/identity.key",
      "pin_journal_path": "${REPO_ROOT}/state/pins.journal",
      "node_name": "${HOSTNAME}",
      "koneksi_auth_enabled": true,
      "koneksi_static_bearer": "${KIPFS_STATIC_BEARER}",
      "koneksi_backend_url": ${BACKEND_URL_JSON},
      "log_level": "${LOG_LEVEL}",
      "log_format": "text",
      "dht_mode": "auto",
      "noise_enabled": true
    }
    EOF
    echo "generated /config/config.json for ${HOSTNAME} (peers: ${PEERS:-none})"
{{- end }}
