apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "datark.postgres.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "datark.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "datark.postgres.name" . }}
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "datark.postgres.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "datark.postgres.name" . }}
        {{- include "datark.labels" . | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: {{ .Values.images.postgres | quote }}
          # force-load timescaledb so the backend can CREATE EXTENSION timescaledb
          args: ["postgres", "-c", "shared_preload_libraries=timescaledb"]
          ports:
            - { name: postgres, containerPort: {{ .Values.postgres.port }} }
          env:
            - name: POSTGRES_USER
              value: {{ .Values.backend.postgresUser | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.backend.postgresDb | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ include "datark.secretName" . }}, key: POSTGRES_PASSWORD } }
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec: { command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""] }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- include "datark.storageClass" . | nindent 8 }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "datark.postgres.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "datark.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ include "datark.postgres.name" . }}
  ports:
    - name: postgres
      port: {{ .Values.postgres.port }}
      targetPort: {{ .Values.postgres.port }}
