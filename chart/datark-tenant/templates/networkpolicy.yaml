{{- if .Values.networkPolicy.enabled }}
# Default-deny all ingress, then allow only same-namespace + ingress-controller.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "datark.id" . }}-default-deny
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "datark.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: ["Ingress"]
  ingress:
    # traffic from pods in this same namespace
    - from:
        - podSelector: {}
    # the ingress-nginx controller reaching the backend + the public kripfs gateway
    # (adjust label to your install). The kripfs gateway port is opened so a public
    # Ingress (e.g. <id>-poc-cluster.koneksi.co.kr) can front the storage cluster.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - { protocol: TCP, port: {{ .Values.backend.port }} }
        {{- if .Values.kripfs.enabled }}
        - { protocol: TCP, port: {{ .Values.kripfs.gatewayPort }} }
        {{- end }}
{{- end }}
