# DatArk PoC — NHN Cloud inventory
# ansible_host = floating IP (SSH) · priv_ip = private IP (cluster peering) · tls_host = HTTPS server_name

[kipfs_nodes]
datark-kipfs-1 ansible_host=114.110.162.127 priv_ip=192.168.0.104 node_name=kipfs-1 tls_host=poc-kipfs-cluster-1.koneksi.co.kr
datark-kipfs-2 ansible_host=114.110.162.59  priv_ip=192.168.0.62  node_name=kipfs-2 tls_host=poc-kipfs-cluster-2.koneksi.co.kr
datark-kipfs-3 ansible_host=114.110.162.43  priv_ip=192.168.0.49  node_name=kipfs-3 tls_host=poc-kipfs-cluster-3.koneksi.co.kr

[lb]
datark-gateway ansible_host=114.110.161.49 priv_ip=192.168.0.35 tls_host=poc-kipfs-cluster.koneksi.co.kr

[agent]
datark-agent ansible_host=114.110.162.13 priv_ip=192.168.0.41

# convenience group
[kipfs_cluster:children]
kipfs_nodes
lb

[all:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/Documents/poc-nhn-key.pem
