---
# Base setup common to all hosts.
- name: apt update (refresh package lists — avoids the stale-list install failures)
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - python3
    state: present
