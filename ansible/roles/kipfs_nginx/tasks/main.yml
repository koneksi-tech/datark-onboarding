---
# Per-node HTTPS: nginx :443 -> local kipfs daemon :8080.
- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present

- name: Cert directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /etc/ssl/certs/koneksi.co.kr
    - /etc/ssl/private/koneksi.co.kr

- name: Install TLS cert
  ansible.builtin.copy:
    src: "{{ tls_cert_src }}"
    dest: "{{ tls_cert_dest }}"
    mode: "0644"
  notify: reload nginx

- name: Install TLS key
  ansible.builtin.copy:
    src: "{{ tls_key_src }}"
    dest: "{{ tls_key_dest }}"
    mode: "0600"
  notify: reload nginx

- name: Remove default site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Template node vhost
  ansible.builtin.template:
    src: kipfs-node.conf.j2
    dest: "/etc/nginx/sites-available/{{ tls_host }}"
    mode: "0644"
  notify: reload nginx

- name: Enable node vhost
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ tls_host }}"
    dest: "/etc/nginx/sites-enabled/{{ tls_host }}"
    state: link
  notify: reload nginx

- name: Validate nginx config
  ansible.builtin.command: nginx -t
  changed_when: false

- name: Ensure nginx running
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started
